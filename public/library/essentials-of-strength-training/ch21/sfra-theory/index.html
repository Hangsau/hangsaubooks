<!doctype html><html lang=zh-tw><head><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1"><title>刺激-疲勞-恢復-適應理論 — Cortex</title><meta name=description content="個人知識庫"><link rel=stylesheet href=https://hangsau.github.io/cortex/css/variables.css><link rel=stylesheet href=https://hangsau.github.io/cortex/css/base.css><link rel=stylesheet href=https://hangsau.github.io/cortex/css/layout.css><link rel=stylesheet href=https://hangsau.github.io/cortex/css/library.css></head><body><nav class=site-nav><a href=https://hangsau.github.io/cortex/ class=site-nav-logo>Cortex</a><ul class=site-nav-links><li><a href=https://hangsau.github.io/cortex/cortex/library/>書庫</a></li><li><a href=https://hangsau.github.io/cortex/cortex/notebook/>筆記</a></li></ul></nav><main class=main-content><article class=book-page><header class=book-header><h1 class=book-title>刺激-疲勞-恢復-適應理論</h1></header><div class=article-body><h2 id=sfra-核心概念>SFRA 核心概念</h2><p>訓練刺激→疲勞↑→恢復→適應（超補償）；量↑則疲勞↑、恢復延遲、超補償幅度↑</p><h2 id=訓練量與疲勞的關係>訓練量與疲勞的關係</h2><p>訓練量↑→疲勞↑→恢復延遲→超補償；量過少→適應↓；量過多→無法恢復→退步</p><h2 id=適應的時間窗口>適應的時間窗口</h2><p>恢復完成後才出現超補償；時間窗口因個人、訓練量、強度而異；週期化的操作核心</p><h2 id=殘留訓練效果>殘留訓練效果</h2><p>前一訓練期的適應效果（residual effect）可延續至下一期；是規劃訓練順序的重要依據</p><h2 id=週期內普遍存在>週期內普遍存在</h2><p>此循環模式存在於訓練動作、單次課程、訓練日、中週期等各層級中</p></div></article></main><footer class=site-footer><p>Cortex</p></footer></body></html>
