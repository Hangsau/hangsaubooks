{{ define "head-extra" }}
<link rel="stylesheet" href="/css/cscs.css">
<link rel="stylesheet" href="/css/cscs-chapter.css">
{{ end }}

{{ define "main" }}
<div class="book-hero">
  <div class="book-cover-img">
    <img src="/images/cscs-cover.jpg" alt="CSCS封面">
  </div>
  <div class="book-info">
    <div class="book-tag">Strength &amp; Conditioning</div>
    <div class="book-title-lg">CSCS 肌力與體能訓練</div>
    <div class="book-sub">Essentials of Strength Training and Conditioning · 4th Ed.</div>
    <div class="book-sub" style="margin-top:6px">G. Gregory Haff · N. Travis Triplett</div>
  </div>
</div>

<div class="home-grid">
  {{ range .Sections }}
  <a href="{{ .Permalink }}" class="home-card">
    <div>{{ .Title }}</div>
  </a>
  {{ end }}
</div>
{{ end }}
