{{ define "head-extra" }}
<link rel="stylesheet" href="{{ "/css/library.css" | absURL }}">
{{ end }}

{{ define "main" }}
<section class="library-section">
  <header class="section-header">
    <h1>{{ .Title }}</h1>
    {{ with .Description }}<p class="section-description">{{ . }}</p>{{ end }}
  </header>

  <ul class="book-list">
    {{ range .Pages }}
    <li class="book-item">
      <a href="{{ .RelPermalink }}" class="book-link">
        <span class="book-title">{{ .Title }}</span>
        {{ with .Params.author }}<span class="book-author">{{ . }}</span>{{ end }}
        {{ with .Params.status }}<span class="book-status book-status--{{ . }}">{{ . }}</span>{{ end }}
      </a>
    </li>
    {{ end }}
  </ul>
</section>
{{ end }}
