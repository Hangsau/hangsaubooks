{{ define "head-extra" }}
<link rel="stylesheet" href="{{ .Site.BaseURL }}css/library.css">
<link rel="stylesheet" href="{{ .Site.BaseURL }}css/adm.css">
{{ end }}

{{ define "main" }}
<div class="adm-page-header">
  <a href="{{ .Parent.Permalink }}" class="adm-back-link">← Athlete Development Matrix</a>
  <h1 class="adm-page-title">{{ .Title }}</h1>
  {{ with .Description }}<p class="adm-page-desc">{{ . }}</p>{{ end }}
</div>

<article class="adm-article">
  {{ .Content }}
</article>
{{ end }}
