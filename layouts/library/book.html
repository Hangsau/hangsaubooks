{{ define "head-extra" }}
<link rel="stylesheet" href="{{ .Site.BaseURL }}css/library.css">
<link rel="stylesheet" href="{{ .Site.BaseURL }}css/cscs-chapter.css">
{{ end }}

{{ define "main" }}
<div class="book-hero">
  {{ with .Params.cover }}
  <div class="book-cover-img">
    <img src="{{ printf "%s%s" $.Site.BaseURL . }}" alt="{{ $.Title }}封面">
  </div>
  {{ end }}
  <div class="book-info">
    <div class="book-tag">{{ delimit .Params.topics " · " }}</div>
    <div class="book-title-lg">{{ .Title }}</div>
    {{ with .Params.edition }}<div class="book-sub">{{ . }} Edition</div>{{ end }}
    {{ with .Params.author }}<div class="book-sub" style="margin-top:6px">{{ . }}</div>{{ end }}
  </div>
</div>

<div class="home-grid">
  {{ range .Sections }}
  <a href="{{ .Permalink }}" class="home-card">
    <div>{{ .Title }}</div>
  </a>
  {{ end }}
</div>
{{ end }}
