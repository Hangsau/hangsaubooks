{{ define "head-extra" }}
<link rel="stylesheet" href="/css/library.css">
{{ end }}

{{ define "main" }}
<article class="book-page">
  <header class="book-header">
    <h1 class="book-title">{{ .Title }}</h1>
    {{ with .Params.author }}<p class="book-author">{{ . }}</p>{{ end }}
    {{ with .Params.edition }}<p class="book-edition">{{ . }} edition</p>{{ end }}
  </header>

  {{ with .Content }}
  <div class="article-body">{{ . }}</div>
  {{ end }}

  {{ if .Pages }}
  <nav class="book-sections">
    {{ range .Pages }}
    <a href="{{ .RelPermalink }}" class="book-section-link">{{ .Title }}</a>
    {{ end }}
  </nav>
  {{ end }}
</article>
{{ end }}
