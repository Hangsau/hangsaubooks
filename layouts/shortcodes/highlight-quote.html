{{/*
  highlight-quote: 書摘引用區塊
  用法: {{< highlight-quote source="書名 p.123" >}}引用文字{{< /highlight-quote >}}
*/}}
<blockquote class="highlight-quote">
  <p class="highlight-quote-text">{{ .Inner | markdownify }}</p>
  {{ with .Get "source" }}
  <cite class="highlight-quote-source">{{ . }}</cite>
  {{ end }}
</blockquote>
