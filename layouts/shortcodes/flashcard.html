{{/*
  flashcard: 正反面翻轉卡片
  用法: {{< flashcard question="問題" answer="答案" >}}
*/}}
<div class="flashcard" role="button" tabindex="0" aria-label="點擊翻轉卡片">
  <div class="flashcard-inner">
    <div class="flashcard-front">
      <p>{{ .Get "question" }}</p>
    </div>
    <div class="flashcard-back">
      <p>{{ .Get "answer" }}</p>
    </div>
  </div>
</div>
