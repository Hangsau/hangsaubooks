{{/*
  callout: 筆記標註區塊
  type: note | warning | tip | important
  用法: {{< callout type="tip" >}}內容{{< /callout >}}
*/}}
{{ $type := .Get "type" | default "note" }}
<div class="callout callout--{{ $type }}" role="note">
  <span class="callout-label">{{ $type }}</span>
  <div class="callout-body">{{ .Inner | markdownify }}</div>
</div>
