{{ define "head-extra" }}
<link rel="stylesheet" href="{{ .Site.BaseURL }}css/notebook.css">
{{ end }}

{{ define "main" }}
<article class="note-page">
  <header class="article-header">
    <h1 class="article-title">{{ .Title }}</h1>
    {{ with .Date }}
    <time class="article-date" datetime="{{ .Format "2006-01-02" }}">{{ .Format "2006-01-02" }}</time>
    {{ end }}
  </header>
  <div class="article-body">
    {{ .Content }}
  </div>
</article>
{{ end }}
