{{ define "main" }}
<section class="section-list">
  <header class="section-header">
    <h1>{{ .Title }}</h1>
    {{ with .Description }}<p class="section-description">{{ . }}</p>{{ end }}
  </header>

  {{ with .Content }}
  <div class="section-content">{{ . }}</div>
  {{ end }}

  {{ if .Pages }}
  <ul class="page-list">
    {{ range .Pages }}
    <li class="page-list-item">
      <a href="{{ .RelPermalink }}" class="page-list-link">{{ .Title }}</a>
      {{ with .Description }}<p class="page-list-desc">{{ . }}</p>{{ end }}
    </li>
    {{ end }}
  </ul>
  {{ end }}
</section>
{{ end }}
