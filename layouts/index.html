{{ define "head-extra" }}
<link rel="stylesheet" href="{{ .Site.BaseURL }}css/bookshelf.css">
{{ end }}

{{ define "main" }}
<section class="bookshelf-page">
  <header class="bookshelf-header">
    <h1 class="bookshelf-title">書庫</h1>
    <p class="bookshelf-subtitle">{{ .Site.Params.description }}</p>
  </header>

  <div class="shelf">
    {{ range .Site.Data.books }}
    <a href="{{ printf "%slibrary/%s/" $.Site.BaseURL .slug }}" class="book-card" style="--book-color: {{ .color }}">
      <div class="book-spine"></div>
      <div class="book-cover">
        {{ if .cover }}
        <div class="book-cover-thumb">
          <img src="{{ printf "%s%s" $.Site.BaseURL .cover }}" alt="{{ .title }}">
        </div>
        {{ end }}
        <div class="book-topics">{{ delimit .topics " · " }}</div>
        <div class="book-card-title">{{ .title }}</div>
        <div class="book-card-author">{{ .author }}</div>
        {{ if .edition }}<div class="book-card-edition">{{ .edition }} Ed.</div>{{ end }}
        <span class="book-card-status book-card-status--{{ .status }}">{{ .status }}</span>
      </div>
    </a>
    {{ end }}

    <a href="{{ printf "%slibrary/" $.Site.BaseURL }}" class="book-card book-card--add">
      <div class="book-spine book-spine--add"></div>
      <div class="book-cover book-cover--add">
        <span class="book-add-icon">+</span>
        <span class="book-add-label">新增書籍</span>
      </div>
    </a>
  </div>

  <div class="shelf-divider"></div>

  <nav class="quick-nav">
    <a href="{{ printf "%snotebook/" $.Site.BaseURL }}" class="quick-nav-item">
      <span class="quick-nav-icon">✏️</span>
      <span class="quick-nav-label">筆記本</span>
    </a>
  </nav>
</section>
{{ end }}
