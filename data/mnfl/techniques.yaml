themes:
  - id: focus
    name: 思維模式
    desc: 大腦有兩種截然不同的運作模式，善用它們是學習的根基

    techniques:
      - id: focused-mode
        name: 專注模式
        essence: 沿已知路徑密集推進，適合處理熟悉的問題
        why: >
          前額葉注意力網路啟動，思緒沿既有神經模式移動——
          像彈珠在緊密排列的圓樁間彈跳。對已有基礎的知識效率最高；
          面對全新概念容易「卡在錯誤方向」（定勢效應）。
        how:
          - 排除所有干擾（手機靜音、關閉通知、單一視窗）
          - 設定一個明確目標，不要同時處理多件事
          - 持續 20–25 分鐘後，主動停下來讓發散模式接手

      - id: diffuse-mode
        name: 發散模式
        essence: 放鬆時大腦廣泛連結，是創意洞見的來源
        why: >
          預設模式網路（DMN）啟動，思緒可跨越遠距腦區連結。
          專注時這個網路反而受到抑制；困難問題的解法常在此出現——
          龐加萊、愛迪生都靠這個「背景處理」突破難題。
        how:
          - 用力思考一段時間後，主動放下問題
          - 去做其他活動（散步、淋浴、睡前放空）
          - 不主動想答案，讓大腦在背景中運作
          - 隔一段時間再回來，洞見常在此時浮現

      - id: mode-switching
        name: 模式切換
        essence: 在兩種模式間有意識地輪換，是解決難題的核心能力
        why: >
          專注模式先建立初步理解，發散模式在背景中重組碎片。
          兩者輪替等於讓不同腦區接力處理——
          這解釋了為什麼放下題目反而讓答案浮現。
        how:
          - 遇到卡關：強迫自己在 1–2 分鐘內抽身
          - 切換到完全不同的任務（不要只是「休息一下」）
          - 別擔心「放棄」——大腦會繼續在背景處理

      - id: embrace-confusion
        name: 擁抱困惑
        essence: 困惑是正常的學習信號，不是失敗的跡象
        why: >
          困惑意味著你正在接觸超出既有神經模式的新資訊——
          這正是組塊形成的起點。急著找答案會跳過真正的理解過程；
          聰明的學生反而更容易被困惑擊垮，因為他們不習慣這種感覺。
        how:
          - 覺得困惑時，先停下來描述「我具體不懂的是哪一點？」
          - 把困惑說清楚，問題往往就解了一半
          - 把困惑當作「大腦正在建立新連結」的信號，而非警報

  - id: procrastination
    name: 對抗拖延
    desc: 拖延是習慣，不是性格缺陷；改造它只需要改變幾個環節

    techniques:
      - id: pomodoro
        name: 番茄鐘工作法
        essence: 25 分鐘完全專注 + 強制休息獎勵，把任務切成可吞嚥的小塊
        why: >
          把「完成任務」的結果目標轉為「完成一個番茄」的過程目標，
          大幅降低大腦的痛苦反應。短時間壓力下練習也能提升長期抗壓——
          就像在觀眾前練習推桿，上場比賽比較不會發慌。
        how:
          - 計時器設定 25 分鐘
          - 關閉一切干擾（手機、社群、通知）
          - 只要繼續工作，不管有沒有做完
          - 時間到，強制休息 5 分鐘（這步一樣重要）
          - 休息完給自己一個小獎勵

      - id: process-not-outcome
        name: 著重過程非結果
        essence: 把注意力從「要完成什麼」移到「接下來 25 分鐘要做什麼動作」
        why: >
          思考「結果」會觸發大腦的痛苦反應（杏仁核活化），導致逃避。
          思考「過程」則啟動殭屍習慣迴路，不引發痛苦。
          大腦的慣性機制喜歡「過程」勝過「結果」。
        how:
          - 不問「我要完成這份報告」
          - 改問「我接下來 25 分鐘要做什麼？」
          - 只聚焦當下這一步，不想後面還有多遠

      - id: habit-loop
        name: 習慣四部曲
        essence: 提示 → 例行動作 → 獎賞 → 信念。改壞習慣只需改變對提示的反應
        why: >
          習慣存放在基底核，啟動後不耗費意志力——這是節能設計。
          唯一需要意志力的地方，是改變「提示發生後的例行動作」。
          一次只改一個環節，成功率遠高於「下定決心全部改掉」。
        how:
          - 找出你的拖延提示（時間？地點？心情？特定任務類型？）
          - 設計一個新的例行動作替換逃避反應
          - 馬上給自己一個即時小獎勵，強化新迴路
          - 相信改變是可能的——信念是維持改變的燃料

      - id: mental-contrasting
        name: 心理對比法
        essence: 具體想像成功後的生活，再誠實面對現況，讓落差成為動力
        why: >
          單純想像美好未來反而讓大腦誤以為已達成，消減行動衝動。
          加上現實對照後，情緒落差激活動機迴路，產生真正的推力——
          這是有研究支持的自我激勵技術，不是精神喊話。
        how:
          - 具體想像目標達成後的日常（不是虛泛的「成功」畫面）
          - 然後誠實面對現在的處境
          - 讓這個落差成為今天行動的燃料，而非挫折感的來源

  - id: chunking
    name: 建立組塊
    desc: 把知識壓縮成可以自動提取的「組塊」，是所有高手技能的基礎

    techniques:
      - id: active-recall
        name: 主動回想
        essence: 閉上書，試著回想剛才讀的內容——效果是反覆閱讀的 10 倍
        why: >
          「提取練習」直接強化神經路徑。反覆閱讀是「再識別」（有提示才認出），
          不等於能獨立提取。考試要的是提取能力，不是識別能力——
          兩種練習方式的神經機制完全不同。
        how:
          - 讀完一段後，閉上書本
          - 把內容說出來或寫下來（不看書）
          - 記不起來的部分，才重新翻去查
          - 幾天後再測一次，鞏固記憶

      - id: spaced-repetition
        name: 間隔重複
        essence: 把學習分散在多天，讓「差點忘記又想起」的過程強化記憶
        why: >
          每次遺忘後再提取，都會強化突觸連結——
          這是「必要難度」（desirable difficulty）原理。
          集中式學習只是短期加工，記憶在睡眠前後大量流失。
        how:
          - 今天學 → 明天複習 → 三天後複習 → 一週後複習
          - 每次複習用主動回想，不要重讀
          - 間隔越拉越長，記得越牢

      - id: interleaved-practice
        name: 穿插練習
        essence: 混合不同類型的題目，而非連續做同類題
        why: >
          強迫大腦每次都重新選擇解法策略，而非自動延續上一題的方法。
          考試本質上就是「不知道下一題是哪種類型」——
          穿插練習正是訓練這個判斷力，而非只訓練計算速度。
        how:
          - 做完一道題後，換不同類型繼續
          - 不要連做 10 題同類型再換
          - 習題書可以跨章節隨機混合練習
          - 一開始會覺得更難——這才是對的感覺

      - id: preview-first
        name: 先瀏覽再細讀
        essence: 精讀前先快速瀏覽標題、圖表、摘要，為大腦建立神經掛勾
        why: >
          預覽在大腦中建立「框架」，細讀時新資訊有了可以掛上去的位置。
          就像先建好衣架再掛衣服——理解速度與深度都顯著提升，
          而且完全不需要更多時間，只需要改變順序。
        how:
          - 打開新章節，先看標題/副標/圖表/章末問題（2 分鐘）
          - 不要讀正文內容，只建立骨架印象
          - 然後從頭細讀，理解速度會明顯加快

  - id: memory
    name: 記憶技術
    desc: 大腦天生擅長視覺與空間記憶，把這個能力挪用來記抽象知識

    techniques:
      - id: memory-palace
        name: 記憶宮殿
        essence: 把要記的東西放入熟悉場所的不同位置，沿路「漫步」就能提取
        why: >
          人類有強大的視覺空間記憶系統（演化自尋路、採集的需要）。
          記憶宮殿把這個系統挪用來記抽象資訊——
          研究顯示，練習後可以記住超過 95% 的放入項目。
        how:
          - 選一個非常熟悉的場所（家、上班路線）
          - 沿固定路線設定 5–10 個位置
          - 在每個位置放入荒誕難忘的畫面代表要記的項目
          - 在腦中「漫步」幾次，就能記住順序

      - id: vivid-imagery
        name: 生動視覺意象
        essence: 把抽象概念轉成誇張、荒誕、搞笑的畫面——越奇怪越難忘
        why: >
          圖像直接連結右腦視覺空間中心；
          大腦優先記錄不尋常事物（注意力濾波機制）。
          加入越多感官（氣味、聲音、觸感），記憶路徑就越多，提取就越容易。
        how:
          - 遇到要記的概念，問「這個可以變成什麼畫面？」
          - 讓畫面荒誕到幾乎不可能發生
          - 加入氣味、聲音、觸感讓它更立體
          - 搞笑或奇怪的細節比「合理的」畫面更容易記住

      - id: analogy
        name: 比喻與類比
        essence: 用已知事物解釋未知概念，新概念借用既有神經路徑落地
        why: >
          新概念需要建立神經連結。類比讓新概念「搭便車」到已有的神經路徑，
          大幅縮短建立時間——這也是為什麼好老師喜歡打比方。
          類比不完美沒關係，關鍵是有個立足點，之後再精緻化。
        how:
          - 遇到新概念，問「這跟我已知的什麼事物最像？」
          - 找到類比後，描述共同點
          - 再找出不同點，精緻化理解

      - id: feynman
        name: 費曼技巧
        essence: 用最簡單的話把概念解釋給外行人聽，找出自己真正不懂的地方
        why: >
          「能說出來」和「真的懂」之間有巨大差距。
          解釋過程中結巴的地方，就是記憶組塊的缺口——
          這個技巧把「自以為懂」的幻覺毫不留情地拆穿。
        how:
          - 選一個剛學的概念
          - 假裝在對完全不懂的人解釋（不用術語）
          - 遇到說不清楚的地方，標記下來
          - 回去補那個部分，直到可以流暢解釋

  - id: testing
    name: 考試策略
    desc: 考試不只是測量學習成果，本身就是最有效的學習方式之一

    techniques:
      - id: hard-first
        name: 由難而易跳躍法
        essence: 先看最難的題，試一兩分鐘後立刻跳走，讓發散模式背景處理
        why: >
          先碰難題把問題「載入大腦」，
          轉去做簡單題時發散模式在背景持續處理；
          回頭時往往突然開竅——這就是為什麼步出考場那一刻答案才浮現的原因。
        how:
          - 拿到考卷先快速瀏覽全部題目
          - 先試最難的（1–2 分鐘）
          - 卡住立刻跳走，不要硬撐
          - 做容易的題（讓發散模式繼續處理難題）
          - 回頭時難題通常已有進展

      - id: testing-is-learning
        name: 測試即學習
        essence: 用假考試學習，比用複習學習記得更牢、更久
        why: >
          提取練習直接強化神經路徑，效果遠超重讀。
          「閱讀感覺像在學習」是一種學習幻覺——
          你認出了內容，但這不等於你能獨立提取它。
        how:
          - 準備考試時，用舊題和自測取代重讀
          - 遮住答案，先自己答，答不出來才查
          - 模擬真實考試壓力（限時、無資料）
          - 做錯的題比做對的題更有學習價值

      - id: pre-exam-sleep
        name: 考前睡眠
        essence: 考前一夜充足睡眠比任何臨時抱佛腳都重要
        why: >
          睡眠中大腦清除代謝廢物、把白天學的東西從海馬迴移入長期記憶，
          並鞏固記憶組塊——這個過程無法跳過或壓縮。
          熬夜複習讓前功盡棄：不只沒存進去，連原本有的也清掉了。
        how:
          - 考前一夜保證睡足（不熬夜）
          - 快速瀏覽重點即可，不要做新的學習
          - 考試當天保留精神給發散模式
          - 考後睡眠同樣重要（讓當天的壓力記憶沉澱）

      - id: reframe-anxiety
        name: 重新定義焦慮
        essence: 把「我好緊張」轉為「我躍躍欲試」——相同的生理反應，完全不同的結果
        why: >
          緊張與興奮的生理反應幾乎相同（腎上腺素、皮質醇上升）。
          大腦對這個激活狀態的詮釋決定表現，而詮釋是可以主動改變的——
          研究顯示，光是對自己說「我很興奮」就能顯著提升表現。
        how:
          - 感到緊張時，主動說「我很興奮，我準備好了」
          - 進行腹式深呼吸（腹部鼓起而非胸腔）
          - 把焦慮感重新標籤為「身體在告訴我這件事很重要」
          - 考前把擔心的想法寫下來，有助於清空工作記憶
