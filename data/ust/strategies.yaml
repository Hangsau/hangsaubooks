strategies:
  - id: retrieval-practice
    name: 提取練習（回想）
    category: memory
    chapter: 1
    essence: 讓大腦主動召回資訊，比重讀更能固化長期記憶
    how:
      - 講課結束後，請學生蓋上筆記，用自己的話寫下剛才學到的重點。
      - 兩人一組互相解釋，不看筆記，看看彼此能說出多少。
      - 這就是提取練習——強迫大腦主動搜尋，神經連結就此固化。

  - id: spaced-repetition
    name: 間隔重複
    category: memory
    chapter: 6
    essence: 把提取練習分散在數天或數月內，比集中複習效果強得多
    how:
      - 不要讓學生只在考前一次大複習，而是每隔一段時間就做一點提取練習。
      - 設計作業時，加入幾題「以前教過的內容」，讓舊知識持續被提取。
      - 這樣做能讓程序性路徑的神經連結持續強化，知識不容易遺忘。

  - id: graphic-organizer
    name: 圖像組織圖
    category: memory
    chapter: 6
    essence: 幫學生建立內在基模，比單純寫筆記更能深度理解教材
    how:
      - 先教學生表面概念，再介紹圖像組織圖。
      - 提供有結構的範本（留空格讓學生填入），協助建立內在基模。
      - 學生有概念後，讓他們自製組織圖，比較和對照不同概念之間的關係。
      - 完成後將組織圖應用於討論、寫作或深入研究，鞏固學習成果。

  - id: note-taking-support
    name: 填空講義
    category: differentiation
    chapter: 2
    essence: 提供有結構的大綱，降低工作記憶負擔，讓工作記憶較少的學生也能跟上
    how:
      - 上課前準備含有空格的大綱或講義，讓學生在聽課時填入關鍵詞。
      - 控制講課和板書速度，不要讓學生邊抄邊跟不上思路。
      - 給提示：「我們會看到五個項目，第一項是……」，幫助學生預期結構。

  - id: pause-and-review
    name: 課中暫停
    category: differentiation
    chapter: 2
    essence: 定期暫停讓學生複習筆記，對工作記憶容量少的學生特別關鍵
    how:
      - 每講一段新內容後，給學生一兩分鐘整理筆記或向學伴確認理解。
      - 暫停時提出開放式問題，讓學生兩人一組討論三十秒。
      - 這讓海馬迴有機會把資訊卸載到新皮質，不讓工作記憶超載。

  - id: interleaving
    name: 交替學習
    category: differentiation
    chapter: 6
    essence: 在練習中混合相似但容易搞混的概念，比反覆練習同一種題型效果更好
    how:
      - 出作業時，不要只練剛教的內容——混入以前學過、容易混淆的題目。
      - 向學生解釋「強壯腿」（已知教材）和「虛弱腿」（新教材）的概念，讓他們兩者交替練習。
      - 這種有益的難度雖然讓學生感覺比較費力，但建立的神經連結更堅固。

  - id: think-pair-share
    name: 思考—配對—分享
    category: active
    chapter: 3
    essence: 讓每位學生都有獨自思考的時間，再透過對話提取和強化記憶
    how:
      - 提出問題後，給學生一兩分鐘獨自思考（這個安靜時間讓海馬迴卸載）。
      - 兩人配對，分享各自的答案。
      - 全班分享，讓更多不同的理解角度浮現。

  - id: quick-summary
    name: 一分鐘歸納
    category: active
    chapter: 3
    essence: 請學生用自己的話寫下剛才學的內容，強迫主動提取而非被動接收
    how:
      - 講課中途暫停，請學生用一分鐘寫下「剛才學到什麼」。
      - 或請學生寫下「最困惑的地方」，讓你掌握哪裡需要再說明。
      - 這個動作讓資訊從工作記憶轉向長期記憶，效果遠比重讀好。

  - id: rapid-fire
    name: 很快輪過一圈
    category: active
    chapter: 3
    essence: 全班依序輪流回答開放式問題，確保每位學生都主動提取，沒有人能躲
    how:
      - 提出一個開放式問題（答案多樣，不是對或錯）。
      - 給學生一分鐘思考或寫下答案，確定每個人都準備好了。
      - 點名後沿著座位順序輪流，每人說幾個字或一句話，不允許打斷。
      - 不要即時糾錯——等所有人都說完，再整體回應。

  - id: peer-teaching
    name: 同儕教學
    category: active
    chapter: 3
    essence: 請學生「教」給學伴聽，是最強力的提取練習之一
    how:
      - 請一位學生向學伴解釋剛才教的概念，然後互換角色。
      - 必要時讓學生角色扮演，例如讓學生演出地球繞太陽旋轉。
      - 確保每位學生都扮演過「教師」的角色，不只是聽別人說。

  - id: pomodoro
    name: 番茄鐘工作法
    category: motivation
    chapter: 4
    essence: 25分鐘專注 + 5分鐘放鬆，讓大腦在發散模式中持續處理難題
    how:
      - 移除所有干擾（關掉手機通知）。
      - 計時25分鐘，期間完全專注於一件事。
      - 放鬆5分鐘：散步、閉眼、喝水——不要滑手機（會蓋掉剛存入的記憶）。
      - 年紀較小的學生，可調整為「年齡＋1」分鐘，例如9歲→10分鐘。

  - id: lesson-hook
    name: 引起動機的誘因
    category: motivation
    chapter: 10
    essence: 課程開頭設計讓學生期待意想不到的驚喜，觸發多巴胺，讓教材黏得更牢
    how:
      - 用引文、短實驗、投票、角色扮演等方式，讓學生在課程開頭就被吸引。
      - 確保誘因連結到隨後要教的重要概念，不能只是好玩。
      - 多樣化：不要每堂課用同一種誘因，意想不到才能持續觸發多巴胺。
      - 讓每位學生都參與（例如請大家寫下答案），不要只叫少數人回答。

  - id: unexpected-reward
    name: 意想不到的獎賞
    category: motivation
    chapter: 7
    essence: 可預期的獎賞建立動機；意想不到的獎賞激發多巴胺，讓神經連結更容易形成
    how:
      - 不要讓獎賞完全可預期——偶爾在意外時機給予讚美或小獎勵。
      - 注意獎賞的量，太多讚美會讓它失去「意想不到」的效果。
      - 了解學生追求的獎賞可能是社交認可，不一定是成績——針對這一點設計誘因。

  - id: direct-instruction
    name: 直接教學三步驟
    category: management
    chapter: 7
    essence: 用「看我做→我們一起做→你來做」建立課室程序，直到變成自動習慣
    how:
      - 第一步「看我做」：示範你希望學生做的行為或程序，說明清楚。
      - 第二步「我們一起做」：和學生一起練習，適時給予讚美和修正。
      - 第三步「你來做」：讓學生獨立練習，直到熟練到不用思考。
      - 從第一天就開始教，必要時重複強化。

  - id: number-lineup
    name: 座號排隊收發作業
    category: management
    chapter: 7
    essence: 為日常程序建立程序性記憶，節省教學時間並讓學生有目的地活動
    how:
      - 為每位學生分配固定座號（對應成績登記冊順序），請學生記在筆記本封面。
      - 練習按座號順序排隊收發作業，多練幾次直到三十秒內完成。
      - 這讓學生離開座位有目的和秩序，同時節省課堂時間，也建立程序性記憶。

  - id: cooperative-structure
    name: 合作學習結構
    category: management
    chapter: 8
    essence: 有結構的小組合作讓每位學生負有責任，防止搭便車，同時緩解壓力
    how:
      - 制定明確的角色分配（紀錄者、發言者、計時者等）。
      - 說明什麼是「搭便車」行為，以及你如何發現和處理。
      - 小組規模：需要規模→較大的組；需要創意→較小的組（2-3人）。
      - 定期檢視小組合作歷程，不只看成果。

  - id: multimedia
    name: 多媒體原則
    category: online
    chapter: 9
    essence: 同時讓學生看到和聽到教材，是線上教學效果最好的方式
    how:
      - 製作影片時，確保學生同時能看到畫面和聽到你的聲音解說。
      - 影片控制在五分鐘左右，其中至少一兩分鐘要看到你本人在說話。
      - 投資一支好麥克風，注意打光——音質和畫質直接影響學生是否願意看完。

  - id: student-video
    name: 學生製作說明影片
    category: online
    chapter: 9
    essence: 請學生為某個主題製作影片，強迫他們深度理解才能解釋清楚
    how:
      - 出「製作說明影片」的作業，讓學生選擇一個概念並解釋給觀眾看。
      - 使用免費工具（TechSmith Capture、iMovie等），降低技術門檻。
      - 評分標準要聚焦在概念的正確性，不是影片製作的精緻度。
      - 把優秀的說明影片存檔，未來可重複使用給新學生看。
